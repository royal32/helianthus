services:
  paperless-webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless_webserver
    restart: always
    depends_on:
      paperless-broker:
        condition: service_started
      stack-bootstrap:
        condition: service_completed_successfully
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - ${CONFIG_ROOT:-.}/paperless/consume:/usr/src/paperless/consume
      - ${CONFIG_ROOT:-.}/paperless/export:/usr/src/paperless/export
    env_file:
      - path: ${CONFIG_ROOT:-.}/paperless/.env
        required: false
    environment:
      PAPERLESS_REDIS: redis://paperless-broker:6379
      PAPERLESS_URL: ${TSDPROXY_URL_SCHEME:-https}://paperless.${TAILNET_DOMAIN}
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER:-${ADMIN_USERNAME:-admin}}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:-${GLOBAL_PASSWORD:-adminadmin}}
      USERMAP_UID: ${USER_ID}
      USERMAP_GID: ${GROUP_ID}
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=paperless
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8000/http
      - tsdproxy.dash.label=Paperless
    profiles:
      - paperless

  paperless-broker:
    image: docker.io/library/redis:8
    container_name: paperless_broker
    restart: always
    volumes:
      - paperless-redis:/data
    profiles:
      - paperless

  paperless-backup:
    container_name: paperless_backup
    image: mazzolino/restic:latest
    env_file:
      - path: ${CONFIG_ROOT:-.}/paperless/backup.env
        required: false
    environment:
      RESTIC_BACKUP_SOURCES: /data
      RESTIC_BACKUP_ARGS: --tag paperless --exclude /data/media/.thumbnails
      PRE_COMMANDS: sqlite3 /data/paperless.db ".backup /tmp/paperless-backup.db" && gzip -c /tmp/paperless-backup.db > /data/paperless-db-backup.gz && rm /tmp/paperless-backup.db
      POST_COMMANDS_SUCCESS: rm -f /data/paperless-db-backup.gz
    volumes:
      - paperless-data:/data
      - paperless-media:/data/media:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CONFIG_ROOT:-.}/paperless/.rclone:/root/.config/rclone:ro
    depends_on:
      paperless-webserver:
        condition: service_started
      stack-bootstrap:
        condition: service_completed_successfully
    restart: always
    profiles:
      - paperless-backup

volumes:
  paperless-data:
  paperless-media:
  paperless-redis:
