services:
  dhcp-relay:
    image: modem7/dhcprelay:latest
    container_name: dhcp-relay
    restart: always
    depends_on:
      adguardhome:
        condition: service_healthy
    command: ["-id", "enp2s0", "-iu", "br_adguard", "10.0.0.10"]
    cap_add:
      - NET_ADMIN
    network_mode: host
    mem_reservation: 6m
    profiles:
      - adguardhome-dhcp

  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "ip addr show | grep -F '10.0.0.10' >/dev/null && wget -qO /dev/null http://127.0.0.1:3000",
        ]
      interval: 1m
      retries: 10
      start_period: 30s
    networks:
      adguardhome:
        ipv4_address: 10.0.0.10
      default:
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "68:68/tcp"
      - "68:68/udp"
      - "853:853/tcp"
    volumes:
      - ./adguardhome/work:/opt/adguardhome/work
      - ./adguardhome/conf:/opt/adguardhome/conf
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=adguardhome
      - tsdproxy.port.1=443/https:3000/http
      - tsdproxy.dash.label=AdGuard Home
    profiles:
      - adguardhome

networks:
  adguardhome:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br_adguard
    ipam:
      config:
        - subnet: 10.0.0.0/24
