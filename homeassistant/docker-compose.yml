services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8123"]
      interval: 1m
      retries: 10
    privileged: true
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=homeassistant
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8123/http, no_autodetect
      - tsdproxy.dash.label=Home Assistant
    profiles:
      - homeassistant
  mosquitto:
    container_name: mosquitto
    image: public.ecr.aws/docker/library/eclipse-mosquitto:latest
    restart: always
    user: ${USER_ID}:${GROUP_ID}
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
    volumes:
      - ${CONFIG_ROOT:-.}/homeassistant/mosquitto/config:/mosquitto/config
      - ${CONFIG_ROOT:-.}/homeassistant/mosquitto/data:/mosquitto/data
    ports:
      - "1883:1883"
    healthcheck:
      test:
        [
          "CMD",
          "mosquitto_sub",
          "-p",
          "1880",
          "-t",
          "$$SYS/#",
          "-C",
          "1",
          "-i",
          "healthcheck",
          "-W",
          "3",
        ]
      interval: 1m
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    profiles:
      - mqtt
  homeassistant-backup:
    image: ghcr.io/adrienpoupa/rclone-backup:latest
    container_name: homeassistant-backup
    restart: always
    env_file:
      - path: ${CONFIG_ROOT:-.}/homeassistant/backup.env
        required: false
    depends_on:
      stack-bootstrap:
        condition: service_completed_successfully
    environment:
      - BACKUP_FOLDER_NAME=backups
      - BACKUP_FOLDER_PATH=/backups
    volumes:
      - ${CONFIG_ROOT:-.}/homeassistant/backups:/backups
      - ${CONFIG_ROOT:-.}/homeassistant/backup:/config
    profiles:
      - homeassistant-backup
