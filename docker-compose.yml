name: docker-compose-nas

services:
  stack-bootstrap:
    build:
      context: .
      dockerfile: setup/Dockerfile
    container_name: stack-bootstrap
    restart: "no"
    environment:
      - NAS_HOST_HOSTNAME=${HOST_HOSTNAME:-}
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
    command: ["/bin/bash", "/stack/scripts/compose-bootstrap.sh"]
    volumes:
      - .:/stack
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/hostname:/host/etc/hostname:ro

  stack-setup:
    build:
      context: .
      dockerfile: setup/Dockerfile
    container_name: stack-setup
    restart: "no"
    environment:
      - SETUP_WAIT_TIMEOUT=${SETUP_WAIT_TIMEOUT:-300}
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
      - NAS_HOST_HOSTNAME=${HOST_HOSTNAME:-}
    volumes:
      - .:/stack
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/hostname:/host/etc/hostname:ro
    depends_on:
      stack-bootstrap:
        condition: service_completed_successfully
      traefik:
        condition: service_started
      sonarr:
        condition: service_started
      radarr:
        condition: service_started
      prowlarr:
        condition: service_started
      qbittorrent:
        condition: service_started
      vpn:
        condition: service_started
      jellyfin:
        condition: service_started
      homepage:
        condition: service_started

  mdns-publisher:
    build:
      context: .
      dockerfile: setup/Dockerfile
    container_name: mdns-publisher
    restart: unless-stopped
    network_mode: host
    environment:
      - MDNS_ENABLED=${MDNS_ENABLED:-true}
      - LOCAL_MDNS_HOSTNAME=
      - LOCAL_MDNS_HOSTS=${GENERATED_MDNS_ALIASES:-},${MDNS_ALIASES:-}
      - MDNS_ADVERTISE_IP=${MDNS_ADVERTISE_IP:-}
    volumes:
      - .:/stack:ro
      - /etc/hostname:/host/etc/hostname:ro
    command: ["/bin/bash", "/stack/scripts/publish-mdns.sh"]

  traefik:
    image: ghcr.io/traefik/traefik:3.6
    container_name: traefik
    restart: always
    environment:
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}
      - CLOUDFLARE_ZONE_API_TOKEN=${CLOUDFLARE_ZONE_API_TOKEN}
      - LETS_ENCRYPT_EMAIL=${LETS_ENCRYPT_EMAIL}
    command:
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web-secure.address=:443
      - --certificatesresolvers.myresolver.acme.dnschallenge=${DNS_CHALLENGE:-true}
      - --certificatesresolvers.myresolver.acme.dnschallenge.provider=${DNS_CHALLENGE_PROVIDER:-cloudflare}
      - --certificatesresolvers.myresolver.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesresolvers.myresolver.acme.caserver=${LETS_ENCRYPT_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
      - --certificatesresolvers.myresolver.acme.email=${LETS_ENCRYPT_EMAIL}
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
      - --providers.file.filename=/traefik-dynamic/local-tls.yml
      - --providers.file.watch=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CONFIG_ROOT:-.}/letsencrypt:/letsencrypt
      - ${CONFIG_ROOT:-.}/traefik/dynamic:/traefik-dynamic:ro
      - ${CONFIG_ROOT:-.}/traefik/certs:/traefik-certs:ro
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    extra_hosts:
      - host.docker.internal:172.17.0.1
    depends_on:
      stack-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 30
  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/sonarr:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8989/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr.rule=Host(`${SONARR_HOSTNAME}`)
      - traefik.http.routers.sonarr.entrypoints=web-secure
      - traefik.http.routers.sonarr.tls=true
      - traefik.http.routers.sonarr.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.sonarr-http.rule=Host(`${SONARR_HOSTNAME}`)
      - traefik.http.routers.sonarr-http.entrypoints=web
      - traefik.http.routers.sonarr-http.service=sonarr
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
      - homepage.group=Media
      - homepage.name=Sonarr
      - homepage.icon=sonarr.png
      - homepage.href=${PUBLIC_SCHEME:-http}://${SONARR_HOSTNAME}
      - homepage.description=Series management
      - homepage.weight=0
      - homepage.widget.type=sonarr
      - homepage.widget.url=http://sonarr:8989
      - homepage.widget.key=${SONARR_API_KEY}
  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/radarr:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:7878/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`${RADARR_HOSTNAME}`)
      - traefik.http.routers.radarr.entrypoints=web-secure
      - traefik.http.routers.radarr.tls=true
      - traefik.http.routers.radarr.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.radarr-http.rule=Host(`${RADARR_HOSTNAME}`)
      - traefik.http.routers.radarr-http.entrypoints=web
      - traefik.http.routers.radarr-http.service=radarr
      - traefik.http.services.radarr.loadbalancer.server.port=7878
      - homepage.group=Media
      - homepage.name=Radarr
      - homepage.icon=radarr.png
      - homepage.href=${PUBLIC_SCHEME:-http}://${RADARR_HOSTNAME}
      - homepage.description=Movies management
      - homepage.weight=1
      - homepage.widget.type=radarr
      - homepage.widget.url=http://radarr:7878
      - homepage.widget.key=${RADARR_API_KEY}
  lidarr:
    image: lscr.io/linuxserver/lidarr
    container_name: lidarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/lidarr:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8686/lidarr/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - traefik.enable=true
      - traefik.http.routers.lidarr.rule=PathPrefix(`/lidarr`)
      - traefik.http.routers.lidarr.tls=true
      - traefik.http.routers.lidarr.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.services.lidarr.loadbalancer.server.port=8686
      - homepage.group=Media
      - homepage.name=Lidarr
      - homepage.icon=lidarr.png
      - homepage.href=/lidarr
      - homepage.description=Music management
      - homepage.weight=2
      - homepage.widget.type=lidarr
      - homepage.widget.url=http://lidarr:8686/lidarr
      - homepage.widget.key=${LIDARR_API_KEY}
    profiles:
      - lidarr
  bazarr:
    image: lscr.io/linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/bazarr/config:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:6767/bazarr/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - traefik.enable=true
      - traefik.http.routers.bazarr.rule=PathPrefix(`/bazarr`)
      - traefik.http.routers.bazarr.tls=true
      - traefik.http.routers.bazarr.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.services.bazarr.loadbalancer.server.port=6767
      - homepage.group=Download
      - homepage.name=Bazarr
      - homepage.icon=bazarr.png
      - homepage.href=/bazarr
      - homepage.description=Subtitles management
      - homepage.weight=4
      - homepage.widget.type=bazarr
      - homepage.widget.url=http://bazarr:6767/bazarr
      - homepage.widget.key=${BAZARR_API_KEY}
    profiles:
      - bazarr
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/seerr:/app/config
    restart: always
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 10s
      retries: 30
    labels:
      - traefik.enable=true
      - traefik.http.routers.seerr.rule=(Host(`${SEERR_HOSTNAME}`))
      - traefik.http.routers.seerr.entrypoints=web-secure
      - traefik.http.routers.seerr.tls=true
      - traefik.http.routers.seerr.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.seerr-http.rule=(Host(`${SEERR_HOSTNAME}`))
      - traefik.http.routers.seerr-http.entrypoints=web
      - traefik.http.routers.seerr-http.service=seerr
      - traefik.http.services.seerr.loadbalancer.server.port=5055
      - homepage.group=Media
      - homepage.name=Seerr
      - homepage.icon=jellyseerr.png
      - homepage.href=${PUBLIC_SCHEME:-http}://${SEERR_HOSTNAME}
      - homepage.description=Content Recommendations and Request Management
      - homepage.weight=3
      - homepage.widget.type=jellyseerr
      - homepage.widget.url=http://seerr:5055
      - homepage.widget.key=${SEERR_API_KEY}
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/prowlarr:/config
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:9696/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - traefik.enable=true
      - traefik.http.routers.prowlarr.rule=Host(`${PROWLARR_HOSTNAME}`)
      - traefik.http.routers.prowlarr.entrypoints=web-secure
      - traefik.http.routers.prowlarr.tls=true
      - traefik.http.routers.prowlarr.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.prowlarr-http.rule=Host(`${PROWLARR_HOSTNAME}`)
      - traefik.http.routers.prowlarr-http.entrypoints=web
      - traefik.http.routers.prowlarr-http.service=prowlarr
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
      - homepage.group=Download
      - homepage.name=Prowlarr
      - homepage.icon=prowlarr.png
      - homepage.href=${PUBLIC_SCHEME:-http}://${PROWLARR_HOSTNAME}
      - homepage.description=Indexers management
      - homepage.weight=1
      - homepage.widget.type=prowlarr
      - homepage.widget.url=http://prowlarr:9696
      - homepage.widget.key=${PROWLARR_API_KEY}
  suggestarr:
    image: ciuse99/suggestarr:latest
    container_name: suggestarr
    environment:
      - SUBPATH=/suggestarr
    volumes:
      - ${CONFIG_ROOT:-.}/suggestarr:/app/config/config_files
    restart: always
    labels:
    - traefik.enable=true
    - traefik.http.routers.suggestarr.rule=PathPrefix(`/suggestarr`)
    - traefik.http.routers.suggestarr.tls=true
    - traefik.http.routers.suggestarr.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
    - traefik.http.services.suggestarr.loadbalancer.server.port=5000
    - traefik.http.routers.suggestarr.middlewares=suggestarr-strip-slash
    - traefik.http.middlewares.suggestarr-strip-slash.redirectregex.regex=(^.*\/suggestarr$$)
    - traefik.http.middlewares.suggestarr-strip-slash.redirectregex.replacement=$$1/
    - traefik.http.middlewares.suggestarr-strip-slash.redirectregex.permanent=false
    - homepage.group=Media
    - homepage.name=Suggestarr
    - homepage.icon=suggest-arr.png
    - homepage.href=/suggestarr
    - homepage.description=Media recommendations
    - homepage.weight=6
    profiles:
      - suggestarr
  flaresolverr:
    image: 21hsmw/flaresolverr:nodriver
    container_name: flaresolverr
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TIMEZONE}
    labels:
      - traefik.enable=true
      - traefik.http.routers.flaresolverr.rule=PathPrefix(`/flaresolverr`)
      - traefik.http.routers.flaresolverr.tls=true
      - traefik.http.services.flaresolverr.loadbalancer.server.port=8191
    profiles:
      - flaresolverr
  autobrr:
    container_name: autobrr
    image: ghcr.io/autobrr/autobrr:latest
    restart: always
    environment:
      - TZ=${TIMEZONE}
      - AUTOBRR__BASE_URL=/autobrr/
    user: ${USER_ID}:${GROUP_ID}
    volumes:
      - ${CONFIG_ROOT:-.}/autobrr:/config
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.autobrr-strip.stripprefix.prefixes=/autobrr
      - traefik.http.middlewares.autobrr-strip.stripprefix.forceSlash=true
      - traefik.http.routers.autobrr.rule=PathPrefix(`/autobrr`)
      - traefik.http.routers.autobrr.tls=true
      - traefik.http.routers.autobrr.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.services.autobrr.loadbalancer.server.port=7474
      - traefik.http.routers.autobrr.middlewares=autobrr-strip
      - homepage.group=Download
      - homepage.name=Autobrr
      - homepage.icon=autobrr.png
      - homepage.href=/autobrr
      - homepage.description=Torrent download automation
      - homepage.weight=7
      - homepage.widget.type=autobrr
      - homepage.widget.url=http://autobrr:7474
      - homepage.widget.key=${AUTOBRR_API_KEY}
    profiles:
      - autobrr
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:libtorrentv1
    container_name: qbittorrent
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
      - DOCKER_MODS=ghcr.io/gabe565/linuxserver-mod-vuetorrent
    volumes:
      - ${CONFIG_ROOT:-.}/qbittorrent:/config
      - ${DOWNLOAD_ROOT}:/data/torrents
    restart: always
    healthcheck:
      # Container may fail if the PIA's token expired, so mark as unhealthy when there is no internet connection
      # see: https://github.com/qdm12/gluetun/issues/641#issuecomment-933856220
      test:
        ["CMD", "curl", "--fail", "http://127.0.0.1:8080", "https://google.com"]
      interval: 10s
      timeout: 10s
      retries: 30
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy
    labels:
      - com.centurylinklabs.watchtower.depends-on=vpn
      - homepage.group=Download
      - homepage.name=qBittorrent
      - homepage.icon=qbittorrent.png
      - homepage.href=${PUBLIC_SCHEME:-http}://${QBITTORRENT_HOSTNAME}
      - homepage.description=Bittorrent client
      - homepage.weight=2
      - homepage.widget.type=qbittorrent
      - homepage.widget.url=http://vpn:8080
      - homepage.widget.username=${QBITTORRENT_USERNAME:-${ADMIN_USERNAME:-admin}}
      - homepage.widget.password=${QBITTORRENT_PASSWORD:-${GLOBAL_PASSWORD:-adminadmin}}
  vpn:
    image: ghcr.io/thrnz/docker-wireguard-pia:latest
    container_name: vpn
    volumes:
      - ${CONFIG_ROOT:-.}/pia:/pia
      - ${CONFIG_ROOT:-.}/pia-shared:/pia-shared
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - LOC=${PIA_LOCATION}
      - USER=${PIA_USER}
      - PASS=${PIA_PASS}
      - QBT_USER=${QBITTORRENT_USERNAME:-${ADMIN_USERNAME:-admin}}
      - QBT_PASS=${QBITTORRENT_PASSWORD:-${GLOBAL_PASSWORD:-adminadmin}}
      - LOCAL_NETWORK=${PIA_LOCAL_NETWORK}
      - PORT_FORWARDING=${PIA_PORT_FORWARDING:-0}
      - PORT_PERSIST=1
      - FIREWALL=0
      - ACTIVE_HEALTHCHECKS=1
      - RECONNECT=1
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.default.disable_ipv6=1
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.lo.disable_ipv6=1
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbittorrent.rule=Host(`${QBITTORRENT_HOSTNAME}`)
      - traefik.http.routers.qbittorrent.entrypoints=web-secure
      - traefik.http.routers.qbittorrent.tls=true
      - traefik.http.routers.qbittorrent.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.qbittorrent-http.rule=Host(`${QBITTORRENT_HOSTNAME}`)
      - traefik.http.routers.qbittorrent-http.entrypoints=web
      - traefik.http.routers.qbittorrent-http.service=qbittorrent
      - traefik.http.routers.qbittorrent-http.middlewares=qbittorrent-drop-encoding
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
      - traefik.http.routers.qbittorrent.middlewares=qbittorrent-drop-encoding
      # https://github.com/VueTorrent/VueTorrent/issues/2718#issuecomment-4189837679
      - traefik.http.middlewares.qbittorrent-drop-encoding.headers.customrequestheaders.Accept-Encoding=
  cross-seed:
    image: ghcr.io/cross-seed/cross-seed:latest
    container_name: cross-seed
    user: ${USER_ID}:${GROUP_ID}
    volumes:
      - ${CONFIG_ROOT:-.}/cross-seed:/config
      - ${DOWNLOAD_ROOT}:/data/torrents
    command: daemon
    restart: always
    profiles:
      - cross-seed
  unpackerr:
    image: ghcr.io/unpackerr/unpackerr:latest
    container_name: unpackerr
    volumes:
      - ${DOWNLOAD_ROOT}:/data/torrents
    restart: always
    user: ${USER_ID}:${GROUP_ID}
    environment:
      - TZ=${TIMEZONE}
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    profiles:
      - unpackerr
  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011/cleanuparr/health"]
      interval: 1m
      timeout: 10s
      start_period: 30s
      retries: 10
    volumes:
      - ${CONFIG_ROOT:-.}/cleanuparr/logs:/var/logs
      - ${CONFIG_ROOT:-.}/cleanuparr/ignored.txt:/usr/ignored.txt
      - ${CONFIG_ROOT:-.}/cleanuparr/blacklist.json:/usr/blacklist.json
      - ${CONFIG_ROOT:-.}/cleanuparr:/config
    environment:
      - TZ=${TIMEZONE}
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - BASE_PATH=/cleanuparr
    labels:
      - traefik.enable=true
      - traefik.http.routers.cleanuparr.rule=PathPrefix(`/cleanuparr`)
      - traefik.http.routers.cleanuparr.tls=true
      - traefik.http.routers.cleanuparr.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.services.cleanuparr.loadbalancer.server.port=11011
      - homepage.group=Download
      - homepage.name=Cleanuparr
      - homepage.icon=cleanuperr.png
      - homepage.href=/cleanuparr
      - homepage.description=Cleanuparr
      - homepage.weight=5
    profiles:
      - cleanuparr
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/sabnzbd:/config
      - ${DATA_ROOT}:/data
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.sabnzbd.rule=PathPrefix(`/sabnzbd`)
      - traefik.http.routers.sabnzbd.tls=true
      - traefik.http.routers.sabnzbd.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.services.sabnzbd.loadbalancer.server.port=8080
      - homepage.group=Download
      - homepage.name=Sabnzbd
      - homepage.icon=sabnzbd.png
      - homepage.href=/sabnzbd
      - homepage.description=Usenet
      - homepage.weight=3
      - homepage.widget.type=sabnzbd
      - homepage.widget.url=http://sabnzbd:8080/sabnzbd
      - homepage.widget.key=${SABNZBD_API_KEY}
    profiles:
      - sabnzbd
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - JELLYFIN_PublishedServerUrl=${PUBLIC_SCHEME:-http}://${JELLYFIN_HOSTNAME}
    volumes:
      - ${CONFIG_ROOT:-.}/jellyfin:/config
      - ${DATA_ROOT}:/data
    ports:
      - "8096:8096"
      - "7359:7359/udp"
      - "1900:1900/udp"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8096/health"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`${JELLYFIN_HOSTNAME}`)
      - traefik.http.routers.jellyfin.entrypoints=web-secure
      - traefik.http.routers.jellyfin.tls=true
      - traefik.http.routers.jellyfin.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.jellyfin-http.rule=Host(`${JELLYFIN_HOSTNAME}`)
      - traefik.http.routers.jellyfin-http.entrypoints=web
      - traefik.http.routers.jellyfin-http.service=jellyfin
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
      - homepage.group=Media
      - homepage.name=Jellyfin
      - homepage.icon=jellyfin.png
      - homepage.href=${PUBLIC_SCHEME:-http}://${JELLYFIN_HOSTNAME}
      - homepage.description=Media server
      - homepage.weight=4
      - homepage.widget.type=jellyfin
      - homepage.widget.url=http://jellyfin:8096
      - homepage.widget.key=${JELLYFIN_API_KEY}
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - DOCKER_MODS=linuxserver/mods:universal-calibre
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1
    volumes:
      - ${CONFIG_ROOT:-.}/calibre-web:/config
      - ${DATA_ROOT}/books:/books
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.calibre-headers.headers.customRequestHeaders.X-Scheme=https
      - traefik.http.middlewares.calibre-headers.headers.customRequestHeaders.X-Script-Name=/calibre
      - traefik.http.middlewares.calibre-stripprefixregex.stripPrefixRegex.regex=/calibre
      - traefik.http.routers.calibre.middlewares=calibre-headers,calibre-stripprefixregex
      - traefik.http.routers.calibre.rule=PathPrefix(`/calibre`)
      - traefik.http.routers.calibre.tls=true
      - traefik.http.routers.calibre.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.services.calibre.loadbalancer.server.port=8083
      - homepage.group=Media
      - homepage.name=Calibre-Web
      - homepage.icon=calibre-web.png
      - homepage.href=/calibre
      - homepage.description=Books management
      - homepage.weight=5
      - homepage.widget.type=calibreweb
      - homepage.widget.url=http://calibre-web:8083
      - homepage.widget.username=${CALIBRE_USERNAME:-${ADMIN_USERNAME:-admin}}
      - homepage.widget.password=${CALIBRE_PASSWORD:-${GLOBAL_PASSWORD:-adminadmin}}
    profiles:
      - calibre-web
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      - HOMEPAGE_VAR_TITLE=${HOMEPAGE_VAR_TITLE}
      - HOMEPAGE_VAR_SEARCH_PROVIDER=${HOMEPAGE_VAR_SEARCH_PROVIDER}
      - HOMEPAGE_VAR_HEADER_STYLE=${HOMEPAGE_VAR_HEADER_STYLE}
      - HOMEPAGE_VAR_WEATHER_CITY=${HOMEPAGE_VAR_WEATHER_CITY}
      - HOMEPAGE_VAR_WEATHER_LAT=${HOMEPAGE_VAR_WEATHER_LAT}
      - HOMEPAGE_VAR_WEATHER_LONG=${HOMEPAGE_VAR_WEATHER_LONG}
      - HOMEPAGE_VAR_WEATHER_TIME=${TIMEZONE}
      - HOMEPAGE_VAR_WEATHER_UNIT=${HOMEPAGE_VAR_WEATHER_UNIT}
      - HOMEPAGE_ALLOWED_HOSTS=*
    volumes:
      - ${CONFIG_ROOT:-.}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_ROOT}:/data
    ports:
      - "3000:3000"
    restart: always
    command:
      [sh, -c, "if [ -d /app/config/tpl ]; then cp -f /app/config/tpl/*.yaml /app/config/ 2>/dev/null || true; fi; node server.js"]
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage.rule=Host(`${HOMEPAGE_HOSTNAME}`) || Host(`${HOMEPAGE_ALIAS_HOSTNAME}`)
      - traefik.http.routers.homepage.entrypoints=web-secure
      - traefik.http.routers.homepage.tls=true
      - traefik.http.routers.homepage.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.homepage-alias.rule=(Host(`${HOMEPAGE_HOSTNAME}`) || Host(`${HOMEPAGE_ALIAS_HOSTNAME}`)) && (Path(`/homepage`) || Path(`/homepage/`))
      - traefik.http.routers.homepage-alias.entrypoints=web-secure
      - traefik.http.routers.homepage-alias.tls=true
      - traefik.http.routers.homepage-alias.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.homepage-alias.priority=1000
      - traefik.http.routers.homepage-alias.middlewares=homepage-alias-redirect
      - traefik.http.routers.homepage-alias.service=homepage
      - traefik.http.routers.homepage-http.rule=Host(`${HOMEPAGE_HOSTNAME}`) || Host(`${HOMEPAGE_ALIAS_HOSTNAME}`)
      - traefik.http.routers.homepage-http.entrypoints=web
      - traefik.http.routers.homepage-http.service=homepage
      - traefik.http.routers.homepage-alias-http.rule=(Host(`${HOMEPAGE_HOSTNAME}`) || Host(`${HOMEPAGE_ALIAS_HOSTNAME}`)) && (Path(`/homepage`) || Path(`/homepage/`))
      - traefik.http.routers.homepage-alias-http.entrypoints=web
      - traefik.http.routers.homepage-alias-http.priority=1000
      - traefik.http.routers.homepage-alias-http.middlewares=homepage-alias-redirect
      - traefik.http.routers.homepage-alias-http.service=homepage
      - traefik.http.middlewares.homepage-alias-redirect.redirectregex.regex=^(.+)/homepage/?$$
      - traefik.http.middlewares.homepage-alias-redirect.redirectregex.replacement=$$1/
      - traefik.http.middlewares.homepage-alias-redirect.redirectregex.permanent=false
      - traefik.http.services.homepage.loadbalancer.server.port=3000
  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: watchtower
    restart: always
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_DEBUG=true
      - WATCHTOWER_INCLUDE_STOPPED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - watchtower
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - autoheal

networks:
  default:
    name: docker-compose-nas
