name: docker-compose-nas

services:
  stack-bootstrap:
    build:
      context: .
      dockerfile: setup/Dockerfile
    container_name: stack-bootstrap
    restart: "no"
    environment:
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
    command: ["/bin/bash", "/stack/scripts/compose-bootstrap.sh"]
    volumes:
      - .:/stack
      - /var/run/docker.sock:/var/run/docker.sock

  stack-setup:
    build:
      context: .
      dockerfile: setup/Dockerfile
    container_name: stack-setup
    restart: "no"
    environment:
      - SETUP_WAIT_TIMEOUT=${SETUP_WAIT_TIMEOUT:-300}
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
    volumes:
      - .:/stack
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      stack-bootstrap:
        condition: service_completed_successfully
      tsdproxy:
        condition: service_started
      sonarr:
        condition: service_started
      radarr:
        condition: service_started
      prowlarr:
        condition: service_started
      qbittorrent:
        condition: service_started
      qui:
        condition: service_healthy
        required: false
      vpn:
        condition: service_started
      jellyfin:
        condition: service_started
      homepage:
        condition: service_started

  tsdproxy:
    image: almeidapaulopt/tsdproxy:2.3.3
    container_name: tsdproxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TSDPROXY_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./tsdproxy/tsdproxy.yaml:/config/tsdproxy.yaml:ro
      - ${CONFIG_ROOT:-.}/tsdproxy/data:/data
    extra_hosts:
      - host.docker.internal:host-gateway
    secrets:
      - tsdproxy_authkey
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=tsdproxy-dashboard
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8080/http, no_autodetect
      - tsdproxy.dash.label=TSDProxy
  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/sonarr:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8989/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=sonarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8989/http
      - tsdproxy.dash.label=Sonarr
  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/radarr:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:7878/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=radarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:7878/http
      - tsdproxy.dash.label=Radarr
  lidarr:
    image: lscr.io/linuxserver/lidarr
    container_name: lidarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/lidarr:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8686/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=lidarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8686/http
      - tsdproxy.dash.label=Lidarr
    profiles:
      - lidarr
  bazarr:
    image: lscr.io/linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/bazarr/config:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:6767/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=bazarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:6767/http
      - tsdproxy.dash.label=Bazarr
    profiles:
      - bazarr
  seerr:
    build:
      context: ./seerr
      args:
        SEERR_REF: ${SEERR_REF:-v3.3.0}
    image: docker-compose-nas/seerr:${SEERR_REF:-v3.3.0}-no-people-search
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/seerr:/app/config
    restart: always
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 10s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=seerr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:5055/http
      - tsdproxy.dash.label=Seerr
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/prowlarr:/config
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:9696/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=prowlarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:9696/http
      - tsdproxy.dash.label=Prowlarr
  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    restart: unless-stopped
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - ORIGIN=${TSDPROXY_URL_SCHEME:-https}://profilarr.${TAILNET_DOMAIN}
      - PARSER_HOST=profilarr-parser
      - PARSER_PORT=5000
      - AUTH=OFF
    volumes:
      - ${CONFIG_ROOT:-.}/profilarr:/config
    depends_on:
      profilarr-parser:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:6868/arr"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=profilarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:6868/http
      - tsdproxy.dash.label=Profilarr
    profiles:
      - profilarr
  profilarr-parser:
    image: ghcr.io/dictionarry-hub/profilarr-parser:latest
    container_name: profilarr-parser
    restart: unless-stopped
    expose:
      - "5000"
    profiles:
      - profilarr
  suggestarr:
    image: ciuse99/suggestarr:latest
    container_name: suggestarr
    volumes:
      - ${CONFIG_ROOT:-.}/suggestarr:/app/config/config_files
    restart: always
    labels:
    - tsdproxy.enable=true
    - tsdproxy.name=suggestarr
    - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:5000/http
    - tsdproxy.dash.label=Suggestarr
    profiles:
      - suggestarr
  flaresolverr:
    image: 21hsmw/flaresolverr:nodriver
    container_name: flaresolverr
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TIMEZONE}
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=flaresolverr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8191/http
      - tsdproxy.dash.label=FlareSolverr
    profiles:
      - flaresolverr
  autobrr:
    container_name: autobrr
    image: ghcr.io/autobrr/autobrr:latest
    restart: always
    environment:
      - TZ=${TIMEZONE}
    user: ${USER_ID}:${GROUP_ID}
    volumes:
      - ${CONFIG_ROOT:-.}/autobrr:/config
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=autobrr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:7474/http
      - tsdproxy.dash.label=Autobrr
    profiles:
      - autobrr
  qui:
    container_name: qui
    build:
      context: ./qui
      args:
        QUI_REF: ${QUI_REF:-v1.19.0}
    image: docker-compose-nas/qui:${QUI_REF:-v1.19.0}-visible-ip
    restart: always
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/qui:/config
      - ${DOWNLOAD_ROOT}:/data/torrents
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=qui
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:7476/http
      - tsdproxy.dash.label=qui
    profiles:
      - qui
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:libtorrentv1
    container_name: qbittorrent
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
      - DOCKER_MODS=ghcr.io/gabe565/linuxserver-mod-vuetorrent
    volumes:
      - ${CONFIG_ROOT:-.}/qbittorrent:/config
      - ${DOWNLOAD_ROOT}:/data/torrents
    restart: always
    healthcheck:
      # Container may fail if the PIA's token expired, so mark as unhealthy when there is no internet connection
      # see: https://github.com/qdm12/gluetun/issues/641#issuecomment-933856220
      test:
        ["CMD", "curl", "--fail", "http://127.0.0.1:8080", "https://google.com"]
      interval: 10s
      timeout: 10s
      retries: 30
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy
    labels:
      - com.centurylinklabs.watchtower.depends-on=vpn
  vpn:
    image: ghcr.io/thrnz/docker-wireguard-pia:latest
    container_name: vpn
    volumes:
      - ${CONFIG_ROOT:-.}/pia:/pia
      - ${CONFIG_ROOT:-.}/pia-shared:/pia-shared
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - LOC=${PIA_LOCATION}
      - USER=${PIA_USER}
      - PASS=${PIA_PASS}
      - QBT_USER=${QBITTORRENT_USERNAME:-${ADMIN_USERNAME:-admin}}
      - QBT_PASS=${QBITTORRENT_PASSWORD:-${GLOBAL_PASSWORD:-adminadmin}}
      - LOCAL_NETWORK=${PIA_LOCAL_NETWORK}
      - PORT_FORWARDING=${PIA_PORT_FORWARDING:-0}
      - PORT_PERSIST=1
      - FIREWALL=0
      - ACTIVE_HEALTHCHECKS=1
      - RECONNECT=1
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.default.disable_ipv6=1
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.lo.disable_ipv6=1
    restart: always
    labels:
      # https://github.com/VueTorrent/VueTorrent/issues/2718#issuecomment-4189837679
      - tsdproxy.enable=true
      - tsdproxy.name=qbittorrent
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8080/http
      - tsdproxy.dash.label=qBittorrent
  cross-seed:
    image: ghcr.io/cross-seed/cross-seed:latest
    container_name: cross-seed
    user: ${USER_ID}:${GROUP_ID}
    volumes:
      - ${CONFIG_ROOT:-.}/cross-seed:/config
      - ${DOWNLOAD_ROOT}:/data/torrents
    command: daemon
    restart: always
    profiles:
      - cross-seed
  unpackerr:
    image: ghcr.io/unpackerr/unpackerr:latest
    container_name: unpackerr
    volumes:
      - ${DOWNLOAD_ROOT}:/data/torrents
    restart: always
    user: ${USER_ID}:${GROUP_ID}
    environment:
      - TZ=${TIMEZONE}
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    profiles:
      - unpackerr
  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011/health"]
      interval: 1m
      timeout: 10s
      start_period: 30s
      retries: 10
    volumes:
      - ${CONFIG_ROOT:-.}/cleanuparr/logs:/var/logs
      - ${CONFIG_ROOT:-.}/cleanuparr/ignored.txt:/usr/ignored.txt
      - ${CONFIG_ROOT:-.}/cleanuparr/blacklist.json:/usr/blacklist.json
      - ${CONFIG_ROOT:-.}/cleanuparr:/config
    environment:
      - TZ=${TIMEZONE}
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=cleanuparr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:11011/http
      - tsdproxy.dash.label=Cleanuparr
    profiles:
      - cleanuparr
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/sabnzbd:/config
      - ${DATA_ROOT}:/data
    restart: always
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=sabnzbd
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8080/http
      - tsdproxy.dash.label=SABnzbd
    profiles:
      - sabnzbd
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - JELLYFIN_PublishedServerUrl=${TSDPROXY_URL_SCHEME:-https}://jellyfin.${TAILNET_DOMAIN}
    volumes:
      - ${CONFIG_ROOT:-.}/jellyfin:/config
      - ${DATA_ROOT}:/data
    ports:
      - "7359:7359/udp"
      - "1900:1900/udp"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8096/health"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=jellyfin
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8096/http
      - tsdproxy.dash.label=Jellyfin
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - DOCKER_MODS=linuxserver/mods:universal-calibre
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1
    volumes:
      - ${CONFIG_ROOT:-.}/calibre-web:/config
      - ${DATA_ROOT}/books:/books
    restart: unless-stopped
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=calibre
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8083/http
      - tsdproxy.dash.label=Calibre-Web
    profiles:
      - calibre-web
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      - HOMEPAGE_VAR_TITLE=${HOMEPAGE_VAR_TITLE}
      - HOMEPAGE_VAR_SEARCH_PROVIDER=${HOMEPAGE_VAR_SEARCH_PROVIDER}
      - HOMEPAGE_VAR_HEADER_STYLE=${HOMEPAGE_VAR_HEADER_STYLE}
      - HOMEPAGE_VAR_WEATHER_CITY=${HOMEPAGE_VAR_WEATHER_CITY}
      - HOMEPAGE_VAR_WEATHER_LAT=${HOMEPAGE_VAR_WEATHER_LAT}
      - HOMEPAGE_VAR_WEATHER_LONG=${HOMEPAGE_VAR_WEATHER_LONG}
      - HOMEPAGE_VAR_WEATHER_TIME=${TIMEZONE}
      - HOMEPAGE_VAR_WEATHER_UNIT=${HOMEPAGE_VAR_WEATHER_UNIT}
      - HOMEPAGE_ALLOWED_HOSTS=*
    volumes:
      - ${CONFIG_ROOT:-.}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_ROOT}:/data
    restart: always
    command:
      [sh, -c, "if [ -d /app/config/tpl ]; then cp -f /app/config/tpl/*.yaml /app/config/ 2>/dev/null || true; fi; node server.js"]
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=homepage
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:3000/http
      - tsdproxy.dash.label=Homepage
  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: watchtower
    restart: always
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_DEBUG=true
      - WATCHTOWER_INCLUDE_STOPPED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - watchtower
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - autoheal

networks:
  default:
    name: docker-compose-nas

secrets:
  tsdproxy_authkey:
    file: ${TSDPROXY_AUTHKEY_PATH:-./secrets/tsdproxy_authkey}
