name: Helianthus
services:

  stack-bootstrap:
    build:
      context: .
      dockerfile: setup/Dockerfile
    container_name: stack-bootstrap
    restart: "no"
    environment:
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
    command: ["/bin/bash", "/stack/scripts/compose-bootstrap.sh"]
    volumes:
      - .:/stack
      - /var/run/docker.sock:/var/run/docker.sock
  stack-setup:
    build:
      context: .
      dockerfile: setup/Dockerfile
    container_name: stack-setup
    restart: "no"
    environment:
      - SETUP_WAIT_TIMEOUT=${SETUP_WAIT_TIMEOUT:-300}
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
    volumes:
      - .:/stack
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      stack-bootstrap:
        condition: service_completed_successfully
      tsdproxy:
        condition: service_started
      sonarr:
        condition: service_started
      radarr:
        condition: service_started
      bazarr:
        condition: service_started
      prowlarr:
        condition: service_started
      qbittorrent:
        condition: service_started
      qui:
        condition: service_healthy
        required: false
      vpn:
        condition: service_started
      jellyfin:
        condition: service_started

  tsdproxy:
    image: almeidapaulopt/tsdproxy:2.3.3
    container_name: tsdproxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TSDPROXY_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./tsdproxy/tsdproxy.yaml:/config/tsdproxy.yaml:ro
      - ${CONFIG_ROOT:-.}/tsdproxy/data:/data
    extra_hosts:
      - host.docker.internal:host-gateway
    secrets:
      - tsdproxy_authkey
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=tsdproxy-dashboard
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8080/http, no_autodetect
      - tsdproxy.dash.label=TSDProxy
      - autoheal=true
  tsdproxy-wake-watchdog:
    image: docker:cli
    container_name: tsdproxy-wake-watchdog
    restart: unless-stopped
    depends_on:
      tsdproxy:
        condition: service_started
    environment:
      - TSDPROXY_WAKE_CHECK_INTERVAL=${TSDPROXY_WAKE_CHECK_INTERVAL:-30}
      - TSDPROXY_WAKE_THRESHOLD_SECONDS=${TSDPROXY_WAKE_THRESHOLD_SECONDS:-120}
      - TSDPROXY_WAKE_GRACE_SECONDS=${TSDPROXY_WAKE_GRACE_SECONDS:-15}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: >-
      sh -ec '
        previous_epoch="$$(date +%s)";
        while sleep "$$TSDPROXY_WAKE_CHECK_INTERVAL"; do
          current_epoch="$$(date +%s)";
          elapsed="$$((current_epoch - previous_epoch))";
          previous_epoch="$$current_epoch";
          if [ "$$elapsed" -le "$$TSDPROXY_WAKE_THRESHOLD_SECONDS" ]; then
            continue;
          fi;
          echo "Detected a $$elapsed-second host clock gap; restarting TSDProxy after a $$TSDPROXY_WAKE_GRACE_SECONDS-second wake grace";
          sleep "$$TSDPROXY_WAKE_GRACE_SECONDS";
          attempt=1;
          while [ "$$attempt" -le 6 ]; do
            if docker restart tsdproxy >/dev/null; then
              echo "Restarted TSDProxy after host wake";
              break;
            fi;
            echo "TSDProxy wake recovery attempt $$attempt failed; retrying in 10 seconds" >&2;
            attempt="$$((attempt + 1))";
            sleep 10;
          done;
          previous_epoch="$$(date +%s)";
        done
      '
    labels:
      - autoheal=true

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/sonarr:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8989/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - autoheal=true
      - tsdproxy.enable=true
      - tsdproxy.name=sonarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8989/http
      - tsdproxy.dash.label=Sonarr
  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/radarr:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:7878/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=radarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:7878/http
      - tsdproxy.dash.label=Radarr
      - autoheal=true
  bazarr:
    image: lscr.io/linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/bazarr/config:/config
      - ${DATA_ROOT}:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:6767/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=bazarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:6767/http
      - tsdproxy.dash.label=Bazarr
      - autoheal=true
  seerr:
   image: ghcr.io/royal32/seerr:develop
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/seerr:/app/config
    restart: always
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 10s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=seerr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:5055/http
      - tsdproxy.dash.label=Seerr
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/prowlarr:/config
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:9696/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=prowlarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:9696/http
      - tsdproxy.dash.label=Prowlarr
      - autoheal=true
  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    restart: unless-stopped
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - ORIGIN=${TSDPROXY_URL_SCHEME:-https}://profilarr.${TAILNET_DOMAIN}
      - PARSER_HOST=profilarr-parser
      - PARSER_PORT=5000
      - AUTH=OFF
    volumes:
      - ${CONFIG_ROOT:-.}/profilarr:/config
    depends_on:
      profilarr-parser:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:6868/arr"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=profilarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:6868/http
      - tsdproxy.dash.label=Profilarr
      - autoheal=true
    profiles:
      - profilarr
  profilarr-parser:
    image: ghcr.io/dictionarry-hub/profilarr-parser:latest
    container_name: profilarr-parser
    restart: unless-stopped
    expose:
      - "5000"
    profiles:
      - profilarr
  ofelia:
    image: mcuadros/ofelia:0.3.19
    container_name: ofelia
    restart: unless-stopped
    command: daemon --docker
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      ofelia.enabled: "true"
      ofelia.job-run.profilarr-window.schedule: "${PROFILARR_START_SCHEDULE:-0 58 2 * * *}"
      ofelia.job-run.profilarr-window.image: "docker:cli"
      ofelia.job-run.profilarr-window.delete: "true"
      ofelia.job-run.profilarr-window.no-overlap: "true"
      ofelia.job-run.profilarr-window.volume: '["/var/run/docker.sock:/var/run/docker.sock"]'
      ofelia.job-run.profilarr-window.environment: '["PROFILARR_RUN_WINDOW=${PROFILARR_RUN_WINDOW:-30m}"]'
      ofelia.job-run.profilarr-window.command: >-
        sh -ec '
          stop_profilarr() {
            docker stop -t 30 profilarr profilarr-parser >/dev/null 2>&1 || true;
          };
          finish_profilarr_window() {
            exit 0;
          };
          wait_until_ready() {
            container="$$1";
            attempts=0;
            while [ "$$attempts" -lt 60 ]; do
              state="$$(docker inspect --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}" "$$container")";
              if [ "$$state" = "healthy" ] || [ "$$state" = "running" ]; then
                return 0;
              fi;
              attempts="$$((attempts + 1))";
              sleep 5;
            done;
            echo "$$container did not become ready within 5 minutes" >&2;
            return 1;
          };
          trap stop_profilarr EXIT;
          trap finish_profilarr_window INT TERM;
          docker start profilarr-parser >/dev/null;
          wait_until_ready profilarr-parser;
          docker start profilarr >/dev/null;
          wait_until_ready profilarr;
          echo "Profilarr is healthy; keeping the daily job window open for $$PROFILARR_RUN_WINDOW";
          sleep "$$PROFILARR_RUN_WINDOW"
        '
    profiles:
      - profilarr
  suggestarr:
    image: ciuse99/suggestarr:latest
    container_name: suggestarr
    volumes:
      - ${CONFIG_ROOT:-.}/suggestarr:/app/config/config_files
    restart: always
    labels:
    - tsdproxy.enable=true
      - tsdproxy.name=suggestarr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:5000/http
      - tsdproxy.dash.label=Suggestarr
      - autoheal=true
    profiles:
      - suggestarr
  flaresolverr:
    image: 21hsmw/flaresolverr:nodriver
    container_name: flaresolverr
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TIMEZONE}
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=flaresolverr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8191/http
      - tsdproxy.dash.label=FlareSolverr
      - autoheal=true
  autobrr:
    container_name: autobrr
    image: ghcr.io/autobrr/autobrr:latest
    restart: always
    environment:
      - TZ=${TIMEZONE}
    user: ${USER_ID}:${GROUP_ID}
    volumes:
      - ${CONFIG_ROOT:-.}/autobrr:/config
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=autobrr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:7474/http
      - tsdproxy.dash.label=Autobrr
      - autoheal=true
    profiles:
      - autobrr
  qui:
    container_name: qui
    build:
      context: ./qui
      args:
        QUI_REF: ${QUI_REF:-v1.20.0}
    image: docker-compose-nas/qui:${QUI_REF:-v1.20.0}-visible-ip
    restart: always
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/qui:/config
      - ${DOWNLOAD_ROOT}:/data/torrents
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=qui
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:7476/http
      - tsdproxy.dash.label=qui
      - autoheal=true
    profiles:
      - qui
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:libtorrentv1
    container_name: qbittorrent
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
      - DOCKER_MODS=ghcr.io/gabe565/linuxserver-mod-vuetorrent
    volumes:
      - ${CONFIG_ROOT:-.}/qbittorrent:/config
      - ${DOWNLOAD_ROOT}:/data/torrents
    restart: always
    healthcheck:
      # Container may fail if the PIA's token expired, so mark as unhealthy when there is no internet connection
      # see: https://github.com/qdm12/gluetun/issues/641#issuecomment-933856220
      test:
        ["CMD", "curl", "--fail", "http://127.0.0.1:8080", "https://google.com"]
      interval: 10s
      timeout: 10s
      retries: 30
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy
    labels:
      - com.centurylinklabs.watchtower.depends-on=vpn
      - autoheal=true
  vpn:
    image: ghcr.io/thrnz/docker-wireguard-pia:latest
    container_name: vpn
    volumes:
      - ${CONFIG_ROOT:-.}/pia:/pia
      - ${CONFIG_ROOT:-.}/pia-shared:/pia-shared
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - LOC=${PIA_LOCATION}
      - USER=${PIA_USER}
      - PASS=${PIA_PASS}
      - QBT_USER=${QBITTORRENT_USERNAME:-${ADMIN_USERNAME:-admin}}
      - QBT_PASS=${QBITTORRENT_PASSWORD:-${GLOBAL_PASSWORD:-adminadmin}}
      - LOCAL_NETWORK=${PIA_LOCAL_NETWORK}
      - PORT_FORWARDING=${PIA_PORT_FORWARDING:-0}
      - PORT_PERSIST=1
      - FIREWALL=0
      - ACTIVE_HEALTHCHECKS=1
      - RECONNECT=1
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.default.disable_ipv6=1
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.lo.disable_ipv6=1
    restart: always
    labels:
      # https://github.com/VueTorrent/VueTorrent/issues/2718#issuecomment-4189837679
      - tsdproxy.enable=true
      - tsdproxy.name=qbittorrent
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8080/http
      - tsdproxy.dash.label=qBittorrent
      - autoheal=true
  unpackerr:
    image: ghcr.io/unpackerr/unpackerr:latest
    container_name: unpackerr
    volumes:
      - ${DOWNLOAD_ROOT}:/data/torrents
    restart: always
    user: ${USER_ID}:${GROUP_ID}
    environment:
      - TZ=${TIMEZONE}
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    profiles:
      - unpackerr
  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011/health"]
      interval: 1m
      timeout: 10s
      start_period: 30s
      retries: 10
    volumes:
      - ${CONFIG_ROOT:-.}/cleanuparr/logs:/var/logs
      - ${CONFIG_ROOT:-.}/cleanuparr/ignored.txt:/usr/ignored.txt
      - ${CONFIG_ROOT:-.}/cleanuparr/blacklist.json:/usr/blacklist.json
      - ${CONFIG_ROOT:-.}/cleanuparr:/config
    environment:
      - TZ=${TIMEZONE}
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=cleanuparr
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:11011/http
      - tsdproxy.dash.label=Cleanuparr
      - autoheal=true
    profiles:
      - cleanuparr
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - JELLYFIN_PublishedServerUrl=${TSDPROXY_URL_SCHEME:-https}://jellyfin.${TAILNET_DOMAIN}
    volumes:
      - ${CONFIG_ROOT:-.}/jellyfin:/config
      - ${DATA_ROOT}:/data
      - ./jellyfin/custom-cont-init.d:/custom-cont-init.d
    ports:
      - "7359:7359/udp"
      - "1900:1900/udp"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8096/health"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=jellyfin
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:8096/http
      - tsdproxy.dash.label=Jellyfin
      - autoheal=true
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      - HOMEPAGE_VAR_TITLE=${HOMEPAGE_VAR_TITLE}
      - HOMEPAGE_VAR_SEARCH_PROVIDER=${HOMEPAGE_VAR_SEARCH_PROVIDER}
      - HOMEPAGE_VAR_HEADER_STYLE=${HOMEPAGE_VAR_HEADER_STYLE}
      - HOMEPAGE_VAR_WEATHER_CITY=${HOMEPAGE_VAR_WEATHER_CITY}
      - HOMEPAGE_VAR_WEATHER_LAT=${HOMEPAGE_VAR_WEATHER_LAT}
      - HOMEPAGE_VAR_WEATHER_LONG=${HOMEPAGE_VAR_WEATHER_LONG}
      - HOMEPAGE_VAR_WEATHER_TIME=${TIMEZONE}
      - HOMEPAGE_VAR_WEATHER_UNIT=${HOMEPAGE_VAR_WEATHER_UNIT}
      - HOMEPAGE_ALLOWED_HOSTS=*
    volumes:
      - ${CONFIG_ROOT:-.}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_ROOT}:/data
    restart: always
    command:
      [sh, -c, "if [ -d /app/config/tpl ]; then cp -f /app/config/tpl/*.yaml /app/config/ 2>/dev/null || true; fi; node server.js"]
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=homepage
      - tsdproxy.port.1=${TSDPROXY_ACCESS_MODE:-443/https}:3000/http
      - tsdproxy.dash.label=Homepage
      - autoheal=true
    profiles:
      - homepage
  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: watchtower
    restart: always
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_DEBUG=true
      - WATCHTOWER_INCLUDE_STOPPED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - autoheal=true
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  default:
    name: Helianthus

secrets:
  tsdproxy_authkey:
    file: ${TSDPROXY_AUTHKEY_PATH:-./secrets/tsdproxy_authkey}
