defaultProxyProvider: default

docker:
  local:
    host: unix:///var/run/docker.sock
    targetHostname: host.docker.internal
    defaultProxyProvider: default
    tryDockerInternalNetwork: true

lists:
  dashboard:
    filename: /config/dashboard.json
    defaultProxyProvider: default
    defaultProxyAccessLog: true

tailscale:
  providers:
    default:
      authKeyFile: /run/secrets/tsdproxy_authkey
      controlUrl: https://controlplane.tailscale.com
      maxCertConcurrency: 1
  dataDir: /data

http:
  hostname: 0.0.0.0
  port: 8080

log:
  level: info
  json: false

proxyAccessLog: true
