services:
  joplin:
    image: joplin/server:latest
    user: root # Not pretty, but non-root breaks volumes: https://github.com/laurent22/joplin/issues/9489
    container_name: joplin
    restart: always
    env_file:
      - path: ${CONFIG_ROOT:-.}/joplin/.env
        required: false
    depends_on:
      stack-bootstrap:
        condition: service_completed_successfully
    environment:
      - APP_PORT=22300
      - APP_BASE_URL=https://joplin.${TAILNET_DOMAIN}
      - DB_CLIENT=sqlite3
      - SQLITE_DATABASE=/database/joplin.db
      - STORAGE_DRIVER=Type=Filesystem; Path=/storage
      - EVENTS_AUTO_DELETE_ENABLED=true
      - EVENTS_AUTO_DELETE_AFTER_DAYS=7
    volumes:
      - ${CONFIG_ROOT:-.}/joplin/database:/database
      - ${CONFIG_ROOT:-.}/joplin/storage:/storage
      - ./joplin/healthcheck:/healthcheck:ro
    healthcheck:
      test: ["CMD", "node", "/healthcheck/healthcheck.js"]
      interval: 1m
      retries: 10
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=joplin
      - tsdproxy.port.1=443/https:22300/http
      - tsdproxy.dash.label=Joplin
    profiles:
      - joplin

  joplin-backup:
    image: ghcr.io/adrienpoupa/rclone-backup:latest
    container_name: joplin-backup
    restart: always
    env_file:
      - path: ${CONFIG_ROOT:-.}/joplin/backup.env
        required: false
    depends_on:
      stack-bootstrap:
        condition: service_completed_successfully
    environment:
      - BACKUP_FOLDER_NAME=storage
      - BACKUP_FOLDER_PATH=/storage
      - DB_TYPE=sqlite
      - SQLITE_DATABASE=/database/joplin.db
    volumes:
      - ${CONFIG_ROOT:-.}/joplin/database:/database
      - ${CONFIG_ROOT:-.}/joplin/storage:/storage
      - ${CONFIG_ROOT:-.}/joplin/backup:/config
    profiles:
      - joplin-backup
