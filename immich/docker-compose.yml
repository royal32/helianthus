services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    environment:
      DB_HOSTNAME: immich_postgres
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_USERNAME: postgres
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich_redis
    volumes:
      - ${IMMICH_UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
      - ${CONFIG_ROOT:-.}/immich/healthcheck:/healthcheck
    depends_on:
      immich-redis:
        condition: service_started
      immich-database:
        condition: service_started
      stack-bootstrap:
        condition: service_completed_successfully
    restart: always
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=immich
      - tsdproxy.port.1=443/https:2283/http
      - tsdproxy.dash.label=Immich
    profiles:
      - immich

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumes:
      - immich-model-cache:/cache
    restart: always
    profiles:
      - immich

  immich-redis:
    container_name: immich_redis
    image: public.ecr.aws/docker/library/redis:6.2
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1
    profiles:
      - immich

  immich-database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:41eacbe83eca995561fe43814fd4891e16e39632806253848efaf04d3c8a8b84
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - ${CONFIG_ROOT:-.}/immich/postgresql:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    profiles:
      - immich

  immich-backup:
    container_name: immich_backup
    image: mazzolino/restic:latest
    env_file:
      - path: ${CONFIG_ROOT:-.}/immich/backup.env
        required: false
    environment:
      RESTIC_BACKUP_SOURCES: /data
      RESTIC_BACKUP_ARGS: --tag immich --exclude /data/thumbs --exclude /data/encoded-video --exclude /data/backups
      PRE_COMMANDS: docker exec immich_postgres pg_dumpall -U postgres | gzip > /data/db-dump.sql.gz
      POST_COMMANDS_SUCCESS: rm -f /data/db-dump.sql.gz
    volumes:
      - ${IMMICH_UPLOAD_LOCATION}:/data
      - ${CONFIG_ROOT:-.}/immich/postgresql:/postgresql:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CONFIG_ROOT:-.}/immich/.rclone:/root/.config/rclone:ro
    depends_on:
      immich-server:
        condition: service_started
      immich-database:
        condition: service_started
      stack-bootstrap:
        condition: service_completed_successfully
    restart: always
    profiles:
      - immich-backup

volumes:
  immich-model-cache:
